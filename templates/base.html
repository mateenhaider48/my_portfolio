<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}Muhammad Mateen Haider - Data Analyst Portfolio{%
      endblock %}
    </title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <!-- Navigation with Logo -->
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">
          <!-- Logo Image - Add your logo file in static/images/logo.png -->
          <img
            src="{{ url_for('static', filename='images/profile.jpg') }}"
            alt="Logo"
            class="navbar-logo"
            onerror="this.style.display = 'none'"
          />
          <span class="brand-text"
            >M Mateen<span class="text-primary">.</span>Haider</span
          >
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('index') }}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('projects') }}">Projects</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('skills') }}">Skills</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('contact') }}">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main>{% block content %}{% endblock %}</main>

    <!-- Footer -->
    <footer>
      <div class="container">
        <div class="row">
          <div class="col-md-6">
            <p>
              &copy; <span id="year"></span> Muhammad Mateen Haider — AI
              Engineer Portfolio
            </p>
          </div>
          <div class="col-md-6 text-md-end">
            <a href="https://github.com/mateenhaider48" class="text-white me-3"
              ><i class="fab fa-github"></i
            ></a>
            <a
              href="https://www.linkedin.com/in/mateenhaider"
              class="text-white me-3"
              ><i class="fab fa-linkedin-in"></i
            ></a>
            <a href="https://x.com/home" class="text-white me-3"
              ><i class="fab fa-twitter"></i
            ></a>
          </div>
        </div>
      </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
      AOS.init({
        duration: 1000,
        once: true,
      });
    </script>
    {% block extra_js %}{% endblock %}
  </body>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</html>
